<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カメレオン・キーボード：大規模調査エディション</title>
    <style>
        html, body { height: 100%; overflow: hidden; margin: 0; padding: 10px; background: #f8f9fa; font-family: sans-serif; touch-action: none; }
        #box { background: #fff; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid #dee2e6; }
        #target { font-size: 28px; font-weight: bold; color: #333; letter-spacing: 2px; }
        #display { font-size: 30px; color: #007bff; min-height: 1.5em; font-weight: bold; background: #e9ecef; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; justify-content: center; }
        #status-bar { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .mode-normal { color: #6c757d; }
        .mode-chameleon { color: #28a745; text-shadow: 0 0 5px rgba(40,167,69,0.2); }
        
        .kb-container { display: flex; flex-direction: column; gap: 6px; height: 50%; }
        .row { display: flex; justify-content: center; gap: 4px; flex: 1; }
        button.key {
            flex: 1; background: #ffffff; border: none; border-radius: 8px;
            font-size: 24px; font-weight: bold; box-shadow: 0 4px 0 #adb5bd;
            -webkit-appearance: none; color: #212529;
        }
        button.key:active { background: #007bff; color: white; transform: translateY(2px); box-shadow: none; }
        
        #final-area { display: none; text-align: center; padding: 20px; }
        #save-btn { background: #007bff; color: white; border: none; padding: 20px; border-radius: 40px; font-size: 22px; width: 100%; font-weight: bold; box-shadow: 0 4px 15px rgba(0,123,255,0.4); }
    </style>
</head>
<body>

<div id="status-bar">
    <div id="progress">準備中...</div>
    <div id="mode-display">モード：判定中</div>
</div>

<div id="box">
    <div id="target">----</div>
    <div id="display"></div>
</div>

<div class="kb-container" id="kb-area">
    <div class="row">
        <button class="key" onclick="tap('Q')">Q</button><button class="key" onclick="tap('W')">W</button>
        <button class="key" onclick="tap('E')">E</button><button class="key" onclick="tap('R')">R</button>
        <button class="key" onclick="tap('T')">T</button><button class="key" onclick="tap('Y')">Y</button>
        <button class="key" onclick="tap('U')">U</button><button class="key" onclick="tap('I')">I</button>
        <button class="key" onclick="tap('O')">O</button><button class="key" onclick="tap('P')">P</button>
    </div>
    <div class="row">
        <button class="key" onclick="tap('A')">A</button><button class="key" onclick="tap('S')">S</button>
        <button class="key" onclick="tap('D')">D</button><button class="key" onclick="tap('F')">F</button>
        <button class="key" onclick="tap('G')">G</button><button class="key" onclick="tap('H')">H</button>
        <button class="key" onclick="tap('J')">J</button><button class="key" onclick="tap('K')">K</button>
        <button class="key" onclick="tap('L')">L</button>
    </div>
    <div class="row">
        <button class="key" onclick="tap('Z')">Z</button><button class="key" onclick="tap('X')">X</button>
        <button class="key" onclick="tap('C')">C</button><button class="key" onclick="tap('V')">V</button>
        <button class="key" onclick="tap('B')">B</button><button class="key" onclick="tap('N')">N</button>
        <button class="key" onclick="tap('M')">M</button>
    </div>
</div>

<div id="final-area">
    <h2 style="margin-bottom:30px;">全テスト完了！</h2>
    <button id="save-btn" onclick="saveData()">CSVを保存して終了</button>
</div>

<script>
    // ワードリスト（40代〜シニア：家族・健康・日常）
    const masterWords = [
        "KAZOKU", "SANPO", "GENKI", "MUSUME", "MUSUKO", 
        "SMILE", "KIBOU", "MEIRU", "YOTEI", "OCHA",
        "KUSURI", "OUEN", "SUSHI", "DENWA", "SAKURA"
    ];

    let log = "No,TargetWord,KeyPressed,Interval_MS,Adjusted,Mode,Timestamp\n";
    let words = [...masterWords]; 
    let wordIdx = 0;
    let lastKeyTime = 0;
    let wordStartTime = 0;

    const offsets = {
        'Q': 150, 'A': 150, 'Z': 150, 'W': 110, 'S': 110, 'X': 110, 'E': 80, 'D': 80, 'C': 80,
        'R': 50, 'F': 50, 'V': 50, 'T': 25, 'G': 25, 'B': 25, 'Y': 25, 'H': 25, 'N': 25,
        'U': 50, 'J': 50, 'M': 50, 'I': 80, 'K': 80, 'O': 110, 'L': 110, 'P': 150
    };
    const leftSideKeys = ['Q','W','E','R','T','A','S','D','F','G','Z','X','C','V','B'];

    function updateUI() {
        const isChameleon = (wordIdx % 2 !== 0); // 偶数問目がカメレオン
        const modeText = isChameleon ? "カメレオン(ON)" : "補正なし(OFF)";
        const modeEl = document.getElementById('mode-display');
        modeEl.innerText = "モード：" + modeText;
        modeEl.className = isChameleon ? "mode-chameleon" : "mode-normal";
        
        document.getElementById('progress').innerText = "第 " + (wordIdx + 1) + " / " + words.length + " 問";
        document.getElementById('target').innerText = words[wordIdx];
        wordStartTime = Date.now();
        lastKeyTime = 0;
    }

    window.onload = updateUI;

    function tap(k) {
        const now = Date.now();
        const isChameleon = (wordIdx % 2 !== 0);
        
        // リズム（打鍵間隔 IKI）の算出
        let interval = 0;
        if (lastKeyTime !== 0) {
            interval = now - lastKeyTime;
        }
        lastKeyTime = now;

        // 補正処理
        let adjusted = isChameleon ? "YES" : "NO";
        
        // ログ記録
        log += (wordIdx + 1) + "," + words[wordIdx] + "," + k + "," + interval + "," + adjusted + "," + (isChameleon ? "Chameleon" : "Normal") + "," + now + "\n";
        
        const displayEl = document.getElementById('display');
        displayEl.innerText += k;

        // 単語完了判定
        if (displayEl.innerText.length >= words[wordIdx].length) {
            wordIdx++;
            if (wordIdx < words.length) {
                setTimeout(() => {
                    displayEl.innerText = "";
                    updateUI();
                }, 300);
            } else {
                document.getElementById('kb-area').style.display = "none";
                document.getElementById('box').style.display = "none";
                document.getElementById('status-bar').style.display = "none";
                document.getElementById('final-area').style.display = "block";
            }
        }
    }

    function saveData() {
        const blob = new Blob([log], {type: 'text/csv'});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "chameleon_AB_test_100.csv";
        a.click();
    }
</script>
</body>
</html>

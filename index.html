<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カメレオン・キーボード（シニア版）</title>
    <style>
        html, body { height: 100%; overflow: hidden; margin: 0; padding: 10px; background: #f0f2f5; font-family: sans-serif; touch-action: none; }
        #box { background: #fff; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #target { font-size: 24px; font-weight: bold; color: #d9534f; } /* 文字を大きく、色をはっきり */
        #display { font-size: 30px; color: #007bff; min-height: 1.5em; font-weight: bold; background: #eee; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; justify-content: center; }
        #progress { font-size: 14px; color: #666; margin-bottom: 5px; }
        
        .kb-container { display: flex; flex-direction: column; gap: 5px; height: 50%; }
        .row { display: flex; justify-content: center; gap: 4px; flex: 1; }
        
        button.key {
            flex: 1;
            background: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 22px; /* キーの文字も大きく */
            font-weight: bold;
            box-shadow: 0 4px 0 #adb5bd;
            -webkit-appearance: none;
            color: #000;
        }
        button.key:active { background: #007bff; color: white; transform: translateY(2px); box-shadow: none; }
        
        #save-area { display: none; text-align: center; margin-top: 20px; }
        #save-btn { background: #28a745; color: white; border: none; padding: 20px; border-radius: 40px; font-size: 22px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div id="box">
    <div id="progress">第 1 / 10 問</div>
    <div style="font-size:14px;color:#666;">下と同じ文字を打ってください：</div>
    <div id="target">RINGO</div>
    <div id="display"></div>
</div>

<div class="kb-container" id="kb-area">
    <div class="row">
        <button class="key" onclick="tap('Q')">Q</button><button class="key" onclick="tap('W')">W</button>
        <button class="key" onclick="tap('E')">E</button><button class="key" onclick="tap('R')">R</button>
        <button class="key" onclick="tap('T')">T</button><button class="key" onclick="tap('Y')">Y</button>
        <button class="key" onclick="tap('U')">U</button><button class="key" onclick="tap('I')">I</button>
        <button class="key" onclick="tap('O')">O</button><button class="key" onclick="tap('P')">P</button>
    </div>
    <div class="row">
        <button class="key" onclick="tap('A')">A</button><button class="key" onclick="tap('S')">S</button>
        <button class="key" onclick="tap('D')">D</button><button class="key" onclick="tap('F')">F</button>
        <button class="key" onclick="tap('G')">G</button><button class="key" onclick="tap('H')">H</button>
        <button class="key" onclick="tap('J')">J</button><button class="key" onclick="tap('K')">K</button>
        <button class="key" onclick="tap('L')">L</button>
    </div>
    <div class="row">
        <button class="key" onclick="tap('Z')">Z</button><button class="key" onclick="tap('X')">X</button>
        <button class="key" onclick="tap('C')">C</button><button class="key" onclick="tap('V')">V</button>
        <button class="key" onclick="tap('B')">B</button><button class="key" onclick="tap('N')">N</button>
        <button class="key" onclick="tap('M')">M</button>
    </div>
</div>

<div id="save-area">
    <button id="save-btn" onclick="saveData()">結果(CSV)を保存する</button>
</div>

<script>
    let log = "No,TargetWord,KeyPressed,TouchX,TouchY,Timestamp,Adjusted\n";
    // シニアの方が親しみやすく、かつ全アルファベットを網羅しがちな10単語
    let words = ["RINGO", "NEKO", "INU", "TOKYO", "KASASA", "YAMA", "KAWA", "HANA", "SORA", "UMI"];
    let idx = 0;

    function tap(k) {
        const e = window.event;
        // 元のタッチ位置を取得
        let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        
        let adjusted = false;

        // 【カメレオン機能：右側の判定スライド】
        // 右側のキーを狙っているのに、手が届かず左側（600pxより左）を叩いてしまった場合
        const rightSideKeys = ['I','O','P','J','K','L','N','M'];
        if (rightSideKeys.includes(k) && x < 600) { 
            // 判定を250px右にスライドさせて記録する
            x += 250; 
            adjusted = true;
        }

        // ログに「補正したかどうか(Adjusted)」も記録するように進化させました
        log += (idx+1) + "," + words[idx] + "," + k + "," + x.toFixed(1) + "," + y.toFixed(1) + "," + Date.now() + "," + (adjusted ? "YES" : "NO") + "\n";
        
        const displayEl = document.getElementById('display');
        displayEl.innerText += k;

        if (displayEl.innerText.length >= words[idx].length) {
            idx++;
            if (idx < words.length) {
                setTimeout(() => {
                    document.getElementById('progress').innerText = "第 " + (idx + 1) + " / " + words.length + " 問";
                    document.getElementById('target').innerText = words[idx];
                    displayEl.innerText = "";
                }, 300);
            } else {
                document.getElementById('kb-area').style.display = "none";
                document.getElementById('save-area').style.display = "block";
                document.getElementById('target').innerText = "お疲れ様でした！";
                displayEl.innerText = "完了";
            }
        }
    }

    function saveData() {
        const blob = new Blob([log], {type: 'text/csv'});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "chameleon_typing_test.csv"; // ファイル名も進化
        a.click();
    }
</script>
</body>
</html>

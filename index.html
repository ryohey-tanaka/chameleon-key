<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chameleon Typing Test - Grand Survey Edition</title>
    <style>
        html, body { 
            height: 100%; overflow: hidden; margin: 0; padding: 10px; 
            background: #f0f2f5; font-family: sans-serif; 
            touch-action: manipulation; -webkit-user-select: none;
        }
        #setup-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:white; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
        .setup-btn { width: 100%; max-width: 300px; padding: 20px; margin: 10px; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; background: #007bff; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input[type="text"] { width: 80%; max-width: 300px; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        #box { background: #fff; padding: 12px; border-radius: 15px; text-align: center; margin-bottom: 8px; border: 2px solid #ddd; }
        #target { font-size: 26px; font-weight: bold; color: #333; letter-spacing: 2px; }
        #display { font-size: 28px; color: #28a745; min-height: 1.2em; font-weight: bold; background: #e8f5e9; border-radius: 8px; margin-top: 8px; display: flex; align-items: center; justify-content: center; }
        #status-bar { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; font-weight: bold; color: #555; }
        .mode-normal { color: #d9534f; } .mode-chameleon { color: #5cb85c; }
        .kb-container { display: flex; flex-direction: column; gap: 4px; height: 50%; position: relative; }
        .row { display: flex; justify-content: center; gap: 4px; flex: 1; }
        .key { flex: 1; background: #fff; border: 1px solid #ccc; border-radius: 6px; font-size: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 0 #bbb; pointer-events: none; }
        #final-area { display: none; text-align: center; padding: 20px; }
        #save-btn { background: #28a745; color: white; border: none; padding: 20px; border-radius: 10px; font-size: 20px; width: 100%; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1 style="font-size:18px; margin-bottom:10px;">端末名を入力してください</h1>
    <input type="text" id="device-name" placeholder="例：iPhone 16 Pro, Pixel 8" maxlength="50">
    <h2 style="font-size:16px; margin-bottom:20px;">操作モードを選択</h2>
    <button class="setup-btn" onclick="checkStart('Right')">右手操作モード</button>
    <button class="setup-btn" onclick="checkStart('Left')">左手操作モード</button>
    <button class="setup-btn" onclick="checkStart('Both')">両手操作モード</button>
</div>

<div id="status-bar">
    <div id="progress">準備中</div>
    <div id="hand-mode-display">-</div>
    <div id="logic-display">-</div>
</div>

<div id="box"><div id="target">----</div><div id="display"></div></div>

<div class="kb-container" id="kb-area">
    <div class="row" id="row1"></div><div class="row" id="row2"></div><div class="row" id="row3"></div>
</div>

<div id="final-area">
    <h2 style="color: #333;">テスト終了</h2>
    <div style="text-align: center; font-size: 15px; line-height: 1.6; color: #444; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #eee;">
        ご協力ありがとうございました。<br>
        端末情報と打鍵データが正常に記録されました。<br><br>
        保存ボタンを押し、ファイルを提出してください。
    </div>
    <button id="save-btn" onclick="saveData()">CSVを保存して提出</button>
</div>

<script>
    const masterWords = ["KAZOKU", "SANPO", "GENKI", "MUSUME", "MUSUKO", "SMILE", "KIBOU", "MEIRU", "YOTEI", "OCHA", "KUSURI", "OUEN", "SUSHI", "DENWA", "SAKURA"];
    const keys = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["Z","X","C","V","B","N","M"]];
    let log = "";
    let wordIdx = 0, lastKeyTime = 0, handStyle = "", deviceNameInput = "";

    // 画面スペックの取得
    const screenInfo = `Device,${window.navigator.userAgent.replace(/,/g, ' ')}\nWidth,${window.screen.width}\nHeight,${window.screen.height}\nRatio,${window.devicePixelRatio}\n\n`;

    keys.forEach((row, i) => {
        const rowEl = document.getElementById('row' + (i+1));
        row.forEach(k => {
            const div = document.createElement('div');
            div.className = 'key'; div.innerText = k; div.id = 'key-' + k;
            rowEl.appendChild(div);
        });
    });

    function checkStart(style) {
        deviceNameInput = document.getElementById('device-name').value.trim();
        if (!deviceNameInput) {
            alert("端末名（機種名）を入力してください。");
            return;
        }
        startTest(style);
    }

    function startTest(style) {
        handStyle = style;
        log = screenInfo + `InputDevice,${deviceNameInput}\n\nNo,TargetWord,KeyPressed,TouchX,TouchY,Interval_MS,Adjusted,Status,HandStyle,LogicMode,Timestamp\n`;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('hand-mode-display').innerText = "操作手: " + style;
        updateUI();
    }

    function updateUI() {
        const isChameleon = (wordIdx % 2 !== 0);
        const logicEl = document.getElementById('logic-display');
        logicEl.innerText = isChameleon ? "モード: アダプティブ" : "モード: スタンダード";
        logicEl.className = isChameleon ? "mode-chameleon" : "mode-normal";
        document.getElementById('progress').innerText = (wordIdx + 1) + " / " + masterWords.length;
        document.getElementById('target').innerText = masterWords[wordIdx];
        document.getElementById('display').innerText = "";
        lastKeyTime = 0;
    }

    document.addEventListener('touchstart', function(e) {
        if (document.getElementById('setup-screen').style.display !== 'none' || document.getElementById('final-area').style.display === 'block') return;
        const touch = e.touches[0];
        const rect = document.getElementById('kb-area').getBoundingClientRect();
        if (touch.clientY < rect.top || touch.clientY > rect.bottom) return;
        if (e.touches.length > 1) e.preventDefault();
        processTap(touch.clientX, touch.clientY, touch.clientX - rect.left, touch.clientY - rect.top);
    }, { passive: false });

    function processTap(globalX, globalY, localX, localY) {
        const isChameleon = (wordIdx % 2 !== 0);
        const currentTargetWord = masterWords[wordIdx];
        const currentProgress = document.getElementById('display').innerText.length;
        const targetChar = currentTargetWord[currentProgress];

        const now = Date.now();
        const interval = lastKeyTime === 0 ? 0 : now - lastKeyTime;
        lastKeyTime = now;

        let finalKey = "";
        let adjusted = "NO";
        let status = "MISS";

        const targetEl = document.getElementById('key-' + targetChar);
        const targetRect = targetEl.getBoundingClientRect();
        const isInsideTarget = (globalX >= targetRect.left && globalX <= targetRect.right && globalY >= targetRect.top && globalY <= targetRect.bottom);

        if (isInsideTarget) {
            finalKey = targetChar;
            status = "SUCCESS";
            adjusted = "NO";
        } else if (isChameleon) {
            let minDist = Infinity;
            let nearestKey = "";
            keys.flat().forEach(k => {
                const el = document.getElementById('key-' + k);
                const r = el.getBoundingClientRect();
                const centerX = r.left + r.width / 2;
                const centerY = r.top + r.height / 2;
                const dist = Math.sqrt(Math.pow(globalX - centerX, 2) + Math.pow(globalY - centerY, 2));
                if (dist < minDist) { minDist = dist; nearestKey = k; }
            });

            if (nearestKey === targetChar) {
                finalKey = targetChar;
                status = "SUCCESS";
                adjusted = "YES";
            } else {
                finalKey = nearestKey;
                status = "MISS"; 
                adjusted = "NO";
            }
        } else {
            status = "MISS";
            adjusted = "NO";
        }

        log += `${wordIdx+1},${currentTargetWord},${finalKey || 'NONE'},${localX.toFixed(1)},${localY.toFixed(1)},${interval},${adjusted},${status},${handStyle},${isChameleon ? 'Chameleon' : 'Normal'},${now}\n`;

        if (status === "SUCCESS") {
            document.getElementById('display').innerText += finalKey;
            if (document.getElementById('display').innerText.length >= currentTargetWord.length) {
                wordIdx++;
                setTimeout(wordIdx < masterWords.length ? updateUI : finish, 200);
            }
        }
    }

    function finish() {
        document.getElementById('kb-area').style.display = 'none';
        document.getElementById('box').style.display = 'none';
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('final-area').style.display = 'block';
        document.body.style.overflow = 'auto'; document.body.style.touchAction = 'auto';
    }

    function saveData() {
        const blob = new Blob([log], {type: 'text/csv'});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const timeLabel = new Date().getTime();
        a.download = `survey_log_${deviceNameInput}_${timeLabel}.csv`;
        a.click();
    }
</script>
</body>
</html>

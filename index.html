<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chameleon Logic - 3Mode Master</title>
    <style>
        html, body { height: 100%; overflow: hidden; margin: 0; padding: 10px; background: #f0f2f5; font-family: sans-serif; touch-action: none; }
        #setup-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:white; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
        .setup-btn { width: 100%; max-width: 300px; padding: 20px; margin: 10px; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; background: #007bff; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        #box { background: #fff; padding: 12px; border-radius: 15px; text-align: center; margin-bottom: 8px; border: 2px solid #ddd; }
        #target { font-size: 26px; font-weight: bold; color: #333; letter-spacing: 2px; }
        #display { font-size: 28px; color: #007bff; min-height: 1.2em; font-weight: bold; background: #eee; border-radius: 8px; margin-top: 8px; display: flex; align-items: center; justify-content: center; }
        
        #status-bar { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; font-weight: bold; color: #555; }
        .mode-normal { color: #d9534f; } /* 補正なしは赤系 */
        .mode-chameleon { color: #5cb85c; } /* カメレオンは緑系 */

        .kb-container { display: flex; flex-direction: column; gap: 4px; height: 55%; position: relative; }
        .row { display: flex; justify-content: center; gap: 4px; flex: 1; }
        button.key {
            flex: 1; background: #fff; border: 1px solid #ccc; border-radius: 6px;
            font-size: 22px; font-weight: bold; position: relative; pointer-events: none; /* タップ判定はコンテナ側で行う */
        }

        #final-area { display: none; text-align: center; padding: 20px; }
        #save-btn { background: #28a745; color: white; border: none; padding: 20px; border-radius: 10px; font-size: 20px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1 style="font-size:22px; margin-bottom:30px;">打ち方を選んでスタート</h1>
    <button class="setup-btn" onclick="startTest('Right')">右手モード</button>
    <button class="setup-btn" onclick="startTest('Left')">左手モード</button>
    <button class="setup-btn" onclick="startTest('Both')">両手モード</button>
</div>

<div id="status-bar">
    <div id="progress">Ready</div>
    <div id="hand-mode-display">Style: -</div>
    <div id="logic-display">Mode: -</div>
</div>

<div id="box">
    <div id="target">----</div>
    <div id="display"></div>
</div>

<div class="kb-container" id="kb-area">
    <div class="row" id="row1"></div>
    <div class="row" id="row2"></div>
    <div class="row" id="row3"></div>
</div>

<div id="final-area">
    <h2>テスト完了</h2>
    <p>お疲れ様でした。CSVを保存してください。</p>
    <button id="save-btn" onclick="saveData()">CSVを保存する</button>
</div>

<script>
    const masterWords = ["KAZOKU", "SANPO", "GENKI", "MUSUME", "MUSUKO", "SMILE", "KIBOU", "MEIRU", "YOTEI", "OCHA", "KUSURI", "OUEN", "SUSHI", "DENWA", "SAKURA"];
    const keys = [
        ["Q","W","E","R","T","Y","U","I","O","P"],
        ["A","S","D","F","G","H","J","K","L"],
        ["Z","X","C","V","B","N","M"]
    ];

    let log = "No,TargetWord,KeyPressed,TouchX,TouchY,Interval_MS,Adjusted,Status,HandStyle,LogicMode,Timestamp\n";
    let wordIdx = 0;
    let lastKeyTime = 0;
    let handStyle = "";
    let words = [...masterWords];

    // 初期設定：キーボードの描画
    keys.forEach((row, i) => {
        const rowEl = document.getElementById('row' + (i+1));
        row.forEach(k => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.innerText = k;
            btn.id = 'key-' + k;
            rowEl.appendChild(btn);
        });
    });

    function startTest(style) {
        handStyle = style;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('hand-mode-display').innerText = "Style: " + style;
        updateUI();
    }

    function updateUI() {
        const isChameleon = (wordIdx % 2 !== 0); // 偶数問がカメレオン
        const logicEl = document.getElementById('logic-display');
        logicEl.innerText = isChameleon ? "Mode: Chameleon" : "Mode: Normal";
        logicEl.className = isChameleon ? "mode-chameleon" : "mode-normal";
        document.getElementById('progress').innerText = (wordIdx + 1) + " / " + words.length;
        document.getElementById('target').innerText = words[wordIdx];
        document.getElementById('display').innerText = "";
        lastKeyTime = 0;
    }

    // タップイベント（コンテナで座標取得）
    document.getElementById('kb-area').addEventListener('touchstart', function(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = this.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        processTap(x, y);
    });

    function processTap(x, y) {
        const isChameleon = (wordIdx % 2 !== 0);
        const now = Date.now();
        const interval = lastKeyTime === 0 ? 0 : now - lastKeyTime;
        lastKeyTime = now;

        let bestKey = "";
        let minUnderDist = Infinity;
        let foundInside = false;
        let adjusted = "NO";
        let status = "MISS";

        // 全キーに対して判定
        keys.flat().forEach(k => {
            const el = document.getElementById('key-' + k);
            const r = el.getBoundingClientRect();
            const relX = touch.clientX - r.left;
            const relY = touch.clientY - r.top;

            // 1. 標準判定（ボタンの内側か？）
            if (relX >= 0 && relX <= r.width && relY >= 0 && relY <= r.height) {
                bestKey = k;
                foundInside = true;
                status = "SUCCESS";
                adjusted = "NO";
            }
        });

        // 2. カメレオン判定（内側になかった場合のみ、一番近いキーを探す）
        if (!foundInside && isChameleon) {
            let nearestKey = "";
            let minDist = Infinity;
            keys.flat().forEach(k => {
                const el = document.getElementById('key-' + k);
                const r = el.getBoundingClientRect();
                const centerX = r.left + r.width/2;
                const centerY = r.top + r.height/2;
                const dist = Math.sqrt(Math.pow(touch.clientX - centerX, 2) + Math.pow(touch.clientY - centerY, 2));
                if (dist < minDist) { minDist = dist; nearestKey = k; }
            });
            bestKey = nearestKey;
            status = "SUCCESS";
            adjusted = "YES";
        }

        // ログ記録
        const logicMode = isChameleon ? "Chameleon" : "Normal";
        log += `${wordIdx+1},${words[wordIdx]},${bestKey || 'NONE'},${x.toFixed(1)},${y.toFixed(1)},${interval},${adjusted},${status},${handStyle},${logicMode},${now}\n`;

        if (status === "SUCCESS") {
            document.getElementById('display').innerText += bestKey;
            if (document.getElementById('display').innerText.length >= words[wordIdx].length) {
                wordIdx++;
                if (wordIdx < words.length) { setTimeout(updateUI, 200); }
                else { finish(); }
            }
        }
    }

    function finish() {
        document.getElementById('kb-area').style.display = 'none';
        document.getElementById('box').style.display = 'none';
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('final-area').style.display = 'block';
    }

    function saveData() {
        const blob = new Blob([log], {type: 'text/csv'});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `chameleon_master_${handStyle}.csv`;
        a.click();
    }
</script>
</body>
</html>
